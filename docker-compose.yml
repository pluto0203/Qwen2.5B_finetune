services:
  qwen-finetune:
    build:
      context: .
      dockerfile: Dockerfile
    image: qwen25-7b-medqa:latest
    container_name: qwen25-7b-medqa
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ./outputs:/workspace/outputs
      - ./data:/workspace/data
      - ./.cache:/workspace/.cache
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_TF32_OVERRIDE=1
      - TOKENIZERS_PARALLELISM=false
      - NVIDIA_VISIBLE_DEVICES=all
    runtime: nvidia
    ports:
      - "6006:6006"
    ipc: host
    shm_size: "64gb"
    ulimits:
      memlock: -1
      stack: 67108864
    command: bash scripts/train.sh configs/train_qwen25_7b_lora.yaml