model:
  name: Qwen/Qwen2.5-7B-Instruct
  load_in_4bit: false
  attn_implementation: auto  # tận dụng H100

data:
  csv_path: data/train/train.csv
  question_col: Question
  answer_col: Answer
  val_size: 0.05
  max_seq_length: 4096                    # tăng từ 2048 → 4096, H100 dư sức
  packing: true
  limit_rows: null
  system_prompt: |
    You are a careful and evidence-aware medical assistant.
      - Provide safe, educational, and concise answers.
      - If a question can be dangerous, recommend consulting a licensed clinician.

    Always follow this structure:

      - Symptom analysis
      - Differential diagnosis (list possible diagnoses)
      - Recommendations (including when to seek medical attention)

    If information is missing, ask further questions before drawing conclusions.

lora:
  r: 32                                   # tăng từ 16 → 32, model học tốt hơn
  alpha: 64                               # giữ alpha = 2*r
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  seed: 42
  output_dir: outputs/qwen25_7b_medqa_lora_h100
  per_device_train_batch_size: 8          # stable with seq_len=4096 on H100 80GB
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2          # effective batch remains high
  num_train_epochs: 3                     # tăng từ 2 → 3
  learning_rate: 1.0e-4                   # giảm từ 2e-4 → 1e-4
  warmup_ratio: 0.05
  logging_steps: 20
  eval_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 200
  save_total_limit: 2
  lr_scheduler_type: cosine
  gradient_checkpointing: false
  report_to: tensorboard
  optim: adamw_torch_fused
  tf32: true
  torch_compile: true
  torch_compile_backend: inductor
  bf16: true
  fp16: false
  bf16_full_eval: true
  group_by_length: true
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  dataloader_persistent_workers: true
  dataset_num_proc: 8
  save_safetensors: true